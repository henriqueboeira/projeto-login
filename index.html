<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/mq.css">

</head>

<body>
    <main>
        <section>
            <div id="img"></div>
            <div id="formulario">
                <form action="post">
                    <h1>Login</h1>
                    <p>Seja bem-vindo(a) novamente. Faça login para acessas sua conta e poder fazer as configurações no
                        seu ambiente</p>

                    <label for="email"><img src="img/account_circle_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt=""></label>
                    <input type="email" id="email" name="email" required placeholder="Seu e-mail">

                    <label for="key"><img src="img/key_vertical_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt=""></label>
                    <input type="password" id="key" name="key" required minlength="8" placeholder="Sua Senha">

                    <input id="send" type="submit" value="Entrar">
                    <input id="esq" type="submit" value="Esqueci a senha">
                </form>
            </div>
        </section>

    </main>
</body>

</html>
